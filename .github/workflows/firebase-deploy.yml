name: Deploy learning hub to Firebase Hosting

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_WEB_CONFIG_JSON: ${{ secrets.FIREBASE_WEB_CONFIG_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate environment.ts from FIREBASE_WEB_CONFIG_JSON
        id: firebase_config
        run: |
          node <<'NODE'
          const fs = require('fs');

          const raw = process.env.FIREBASE_WEB_CONFIG_JSON;
          if (!raw) {
            throw new Error('FIREBASE_WEB_CONFIG_JSON is missing or empty.');
          }

          const config = JSON.parse(raw);
          const required = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
          const missing = required.filter((key) => !config[key]);
          if (missing.length) {
            throw new Error('Missing Firebase config keys: ' + missing.join(', '));
          }
          if (!String(config.apiKey).startsWith('AIza')) {
            throw new Error('Invalid Firebase Web API key format in FIREBASE_WEB_CONFIG_JSON.apiKey');
          }

          const content = `export const environment = {
            production: false,
            firebase: {
              apiKey: '${config.apiKey}',
              authDomain: '${config.authDomain}',
              projectId: '${config.projectId}',
              storageBucket: '${config.storageBucket}',
              messagingSenderId: '${config.messagingSenderId}',
              appId: '${config.appId}',
            },
          };\n`;

          fs.writeFileSync('src/environment.ts', content);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `projectId=${config.projectId}\n`);
          NODE

      - name: Build Angular
        run: npm run build

      - name: Deploy Firestore rules
        run: |
          SERVICE_ACCOUNT_FILE="$RUNNER_TEMP/firebase-service-account.json"
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$SERVICE_ACCOUNT_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$SERVICE_ACCOUNT_FILE"
          npx firebase-tools deploy \
            --only firestore:rules \
            --project "${{ steps.firebase_config.outputs.projectId }}" \
            --non-interactive

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ steps.firebase_config.outputs.projectId }}
          channelId: live
